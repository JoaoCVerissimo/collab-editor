name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: collab
          POSTGRES_PASSWORD: collab_dev
          POSTGRES_DB: collab_editor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type check
        run: npm run typecheck --workspaces --if-present

      - name: Run migrations
        run: npm run migrate --workspace=packages/database
        env:
          DATABASE_URL: postgresql://collab:collab_dev@localhost:5432/collab_editor_test

      - name: Test
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: postgresql://collab:collab_dev@localhost:5432/collab_editor_test
          JWT_SECRET: test-secret
